<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | Michelly Santos</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos específicos para o Dashboard */
        .adm-container { margin: 40px auto; max-width: 1100px; padding: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border-bottom: 4px solid var(--accent-color); }
        .stat-card h3 { font-size: 0.9rem; color: #888; text-transform: uppercase; }
        .stat-card p { font-size: 2rem; font-weight: bold; color: var(--text-primary); }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: var(--accent-color); color: white; font-weight: 400; }
        .btn-action { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; margin-right: 5px; }
        .btn-edit { background: #d4a373; color: white; }
        .btn-del { background: #e2b1b1; color: white; }
        .btn-add { margin-bottom: 20px; }
    </style>
</head>
<body style="background-color: #fcfbf9;">

    <header>
        <nav>
            <div class="logo">ADM Michelly</div>
            <ul>
                <li><a href="index.html">Sair</a></li>
            </ul>
        </nav>
    </header>

    <div class="adm-container">
        <h2>Dashboard de Clientes</h2>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total de Clientes</h3>
                <p id="totalClientes">0</p>
            </div>
            <div class="stat-card">
                <h3>Ativos</h3>
                <p>--</p>
            </div>
        </div>

        <button class="btn btn-add" onclick="abrirModalCliente()">+ Novo Cliente</button>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Pasta/Modelo</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaClientes">
                </tbody>
        </table>
    </div>

    <div id="modalCliente" class="login-modal">
        <div class="modal-content">
            <h2 id="modalTitle">Novo Cliente</h2>
            <input type="hidden" id="clienteId">
            <input type="text" id="clienteNome" placeholder="Nome do Cliente" required>
            <input type="text" id="clientePasta" placeholder="Modelo de Pasta (ex: angelosantos)" required>
            <button onclick="salvarCliente()" class="btn">Salvar</button>
            <p style="cursor:pointer; margin-top:10px;" onclick="fecharModalCliente()">Cancelar</p>
        </div>
    </div>

<script src="adm-script.js"></script>
</body>
</html>
