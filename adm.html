<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Área | Michelly Santos</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .cliente-container { max-width: 600px; margin: 50px auto; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .status-pago { color: green; font-weight: bold; }
        .status-pendente { color: #d4a373; font-weight: bold; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body style="background-color: #fcfbf9;">

    <div class="cliente-container">
        <h2>Olá, <span id="nomeCliente">...</span></h2>
        <p>Aqui está o extrato das suas sessões:</p>

        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Valor</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tabelaFinanceiraCliente"></tbody>
        </table>
        
        <br>
        <a href="index.html" class="btn" style="text-decoration:none; display:inline-block; text-align:center;">Sair</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const idCliente = urlParams.get('id');
        const clientes = JSON.parse(localStorage.getItem('clientes_michelly')) || [];
        const cliente = clientes.find(c => c.id === idCliente);

        if (cliente) {
            document.getElementById('nomeCliente').innerText = cliente.nome;
            const tbody = document.getElementById('tabelaFinanceiraCliente');
            
            if (cliente.financeiro && cliente.financeiro.length > 0) {
                cliente.financeiro.forEach(item => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${item.data}</td>
                            <td>R$ ${item.valor}</td>
                            <td class="status-${item.status.toLowerCase()}">${item.status}</td>
                        </tr>
                    `;
                });
            } else {
                tbody.innerHTML = "<tr><td colspan='3'>Nenhum registro encontrado.</td></tr>";
            }
        } else {
            window.location.href = "index.html";
        }
    </script>
    <script src="adm-script.js"></script>
</body>
</html>
