<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | Michelly Santos</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { max-width: 900px; margin: 40px auto; padding: 20px; font-family: sans-serif; }
        .card-cadastro { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; border: 1px solid #e9e0d2; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #e9e0d2; outline: none; }
        .btn-principal { background: #d4a373; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-principal:hover { background: #b88b5d; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        th { background: #fdfaf6; color: #8c7851; padding: 15px; text-align: left; border-bottom: 2px solid #f4f1ea; }
        td { padding: 15px; border-bottom: 1px solid #f4f1ea; }
        .btn-excluir { background: #ff9999; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body style="background-color: #fcfbf9;">

    <div class="admin-container">
        <h2 style="color: #8c7851; text-align: center; margin-bottom: 30px;">Gestão de Pacientes</h2>

        <div class="card-cadastro">
            <h3 style="color: #8c7851; margin-bottom: 15px;">Cadastrar Novo Paciente</h3>
            <div style="display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap;">
                <input type="text" id="nomeInput" placeholder="Nome Completo" style="flex: 1; min-width: 250px;">
                <input type="email" id="emailInput" placeholder="E-mail (Login)" style="flex: 1; min-width: 250px;">
            </div>
            <button onclick="salvarNovoPacienteSQL()" class="btn-principal" style="width: 100%;">
                Criar Pasta e Gerar Senha Automática
            </button>
        </div>

        <h3 style="color: #8c7851; margin-bottom: 15px;">Pacientes Ativos (Banco SQL)</h3>
        <table>
            <thead>
                <tr>
                    <th>ID (Senha)</th>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaClientes">
                </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <script>
        // 1. CARREGAR PACIENTES DO SUPABASE
        async function renderTable() {
            const tbody = document.getElementById('tabelaClientes');
            if (!tbody) return;

            const { data: pacientes, error } = await _supabase
                .from('pacientes')
                .select('*')
                .order('nome', { ascending: true });

            if (error) {
                console.error("Erro:", error);
                return;
            }

            tbody.innerHTML = '';
            if (pacientes.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Nenhum paciente no banco.</td></tr>';
            }

            pacientes.forEach((p) => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>#${p.id}</strong></td>
                        <td><a href="detalhes-cliente.html?id=${p.id}" style="color:#d4a373; font-weight:bold; text-decoration:none;">${p.nome}</a></td>
                        <td>${p.email}</td>
                        <td>
                            <button onclick="excluirPaciente('${p.id}')" class="btn-excluir">Excluir</button>
                        </td>
                    </tr>
                `;
            });
        }

        // 2. SALVAR NOVO PACIENTE (ID = SENHA)
        async function salvarNovoPacienteSQL() {
            const nome = document.getElementById('nomeInput').value.trim();
            const email = document.getElementById('emailInput').value.trim();

            if (!nome || !email) return alert("Preencha Nome e E-mail!");

            // Gera ID de 4 dígitos
            const novoId = Math.floor(1000 + Math.random() * 9000).toString();

            const { error } = await _supabase
                .from('pacientes')
                .insert([{ 
                    id: novoId, 
                    nome: nome, 
                    email: email, 
                    senha_acesso: novoId, 
                    financeiro: [], 
                    notas: "" 
                }]);

            if (error) {
                alert("Erro ao salvar: " + error.message);
            } else {
                alert("✅ Paciente Cadastrado!\n\nID/Senha: " + novoId);
                document.getElementById('nomeInput').value = '';
                document.getElementById('emailInput').value = '';
                renderTable();
            }
        }

        // 3. EXCLUIR
        async function excluirPaciente(id) {
            if (confirm("Deseja excluir permanentemente?")) {
                const { error } = await _supabase.from('pacientes').delete().eq('id', id);
                if (error) alert("Erro ao excluir");
                else renderTable();
            }
        }

        // Inicia ao carregar a página
        document.addEventListener('DOMContentLoaded', renderTable);
    </script>
</body>
</html>
