<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Gestão - Michelly</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #fcfbf9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        .admin-container { max-width: 1000px; margin: 0 auto; }
        .header-painel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header-painel h2 { color: #555; margin: 0; }
        
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .card h3 { color: #8c7851; margin-top: 0; margin-bottom: 20px; border-bottom: 1px solid #f4f1ea; padding-bottom: 10px; }
        
        /* Grid de Botões Superiores */
        .grid-atalhos { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .btn-atalho { background: white; border: 1px solid #e9e0d2; padding: 15px; border-radius: 12px; text-decoration: none; color: #7b8f80; font-weight: bold; text-align: center; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-atalho:hover { background: #7b8f80; color: white; transform: translateY(-3px); }

        /* Formulário */
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .form-row input { flex: 1; min-width: 250px; padding: 12px; border: 1px solid #e9e0d2; border-radius: 8px; outline: none; }
        .btn-salvar { width: 100%; background: #d4a373; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-salvar:hover { background: #b88b5d; }

        /* Tabela Profissional */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 15px; color: #8c7851; border-bottom: 2px solid #f4f1ea; font-size: 0.9rem; }
        td { padding: 15px; border-bottom: 1px solid #f4f1ea; color: #666; }
        .id-badge { background: #f4f1ea; padding: 4px 8px; border-radius: 5px; font-weight: bold; color: #8c7851; }
        .btn-excluir { background: #ff9999; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-excluir:hover { background: #ff4d4d; }
        .nome-link { color: #d4a373; text-decoration: none; font-weight: bold; }
        .nome-link:hover { text-decoration: underline; }

        footer { margin-top: 50px; text-align: center; padding: 20px; color: #999; border-top: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="header-painel">
            <h2>Painel de Gestão - Michelly</h2>
            <a href="index.html" style="color: #999; text-decoration: none; font-size: 0.9rem;">Sair do Sistema</a>
        </div>

        <div class="grid-atalhos">
            <a href="#" class="btn-atalho">📋 Nova Anamnese</a>
            <a href="#" class="btn-atalho">💰 Fluxo de Caixa</a>
            <a href="#" class="btn-atalho">📁 Drive de Pacientes</a>
            <a href="#" class="btn-atalho">📅 Agenda Online</a>
        </div>

        <div class="card">
            <h3>Cadastrar Novo Paciente</h3>
            <div class="form-row">
                <input type="text" id="nomeInput" placeholder="Nome Completo do Paciente">
                <input type="email" id="emailInput" placeholder="E-mail do Paciente (Login)">
            </div>
            <button onclick="salvarPacienteSQL()" class="btn-salvar">Criar Pasta e Gerar Senha Automática</button>
        </div>

        <div class="card">
            <h3>Pacientes Ativos</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID (SENHA)</th>
                        <th>NOME</th>
                        <th>E-MAIL (LOGIN)</th>
                        <th>AÇÕES</th>
                    </tr>
                </thead>
                <tbody id="tabelaClientes">
                    <tr>
                        <td colspan="4" style="text-align:center; padding:30px;">A carregar pacientes...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <footer>
            &copy; 2026 Michelly Eufrazio Santos - Psicanalista.
        </footer>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        // 1. CARREGAR TABELA
        async function renderTable() {
            const tbody = document.getElementById('tabelaClientes');
            if (!tbody) return;
            
            try {
                const { data: pacientes, error } = await _supabase
                    .from('pacientes')
                    .select('*')
                    .order('nome', { ascending: true });

                if (error) throw error;

                if (!pacientes || pacientes.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px;">Nenhum paciente cadastrado no banco.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                pacientes.forEach(p => {
                    tbody.innerHTML += `
                        <tr>
                            <td><span class="id-badge">#${p.id}</span></td>
                            <td><a href="detalhes-cliente.html?id=${p.id}" class="nome-link">${p.nome}</a></td>
                            <td>${p.email}</td>
                            <td>
                                <button class="btn-excluir" onclick="excluirPaciente('${p.id}', '${p.nome}')">Excluir</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">Erro ao ligar ao banco de dados.</td></tr>';
            }
        }

        // 2. SALVAR NOVO (CORRIGIDO SEM A COLUNA 'NOTAS')
        async function salvarPacienteSQL() {
            const nomeInput = document.getElementById('nomeInput');
            const emailInput = document.getElementById('emailInput');
            
            const nome = nomeInput.value.trim();
            const email = emailInput.value.trim();

            if (!nome || !email) {
                alert("Por favor, preencha o Nome e o E-mail!");
                return;
            }

            // Gera ID de 4 dígitos (Senha)
            const novoId = Math.floor(1000 + Math.random() * 9000).toString();

            try {
                // ENVIANDO APENAS AS COLUNAS QUE EXISTEM COM CERTEZA
                const { error } = await _supabase
                    .from('pacientes')
                    .insert([{ 
                        id: novoId, 
                        nome: nome, 
                        email: email, 
                        senha_acesso: novoId 
                    }]);

                if (error) throw error;

                alert("✅ Sucesso!\nPaciente: " + nome + "\nSenha/ID: " + novoId);
                
                // Limpar campos e recarregar
                nomeInput.value = '';
                emailInput.value = '';
                renderTable();

            } catch (err) {
                console.error("Erro detalhado:", err);
                alert("Erro ao salvar: " + err.message);
            }
        }

        // 3. EXCLUIR
        async function excluirPaciente(id, nome) {
            if (confirm("Tens a certeza que desejas excluir permanentemente o paciente " + nome + "?")) {
                try {
                    const { error } = await _supabase
                        .from('pacientes')
                        .delete()
                        .eq('id', id);

                    if (error) throw error;
                    renderTable();
                } catch (err) {
                    alert("Erro ao excluir.");
                }
            }
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', renderTable);
    </script>
    </body>
</html>
