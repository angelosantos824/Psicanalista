<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prontuário Master | Michelly Santos</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .detalhes-container { max-width: 1100px; margin: 40px auto; padding: 20px; font-family: sans-serif; }
        .grid-prontuario { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; position: relative; }
        .header-ficha { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* Cores de Status */
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .badge-atendimento { background: #e3f2fd; color: #1976d2; }
        .badge-pausa { background: #fff3e0; color: #f57c00; }
        .badge-alta { background: #e8f5e9; color: #388e3c; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
        .status-pago { color: #7b8f80; font-weight: bold; cursor: pointer; }
        .status-pendente { color: #d4a373; font-weight: bold; cursor: pointer; }
        
        textarea { width: 100%; height: 300px; border: 1px solid #eee; border-radius: 8px; padding: 15px; font-family: inherit; resize: none; margin-top: 10px; box-sizing: border-box; line-height: 1.6; }
        
        .btn-save { background: #7b8f80; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-save:hover { background: #637367; }
        .btn-print { background: #f4f4f4; color: #555; border: 1px solid #ddd; padding: 8px 15px; border-radius: 6px; cursor: pointer; margin-right: 10px; }
        
        .btn-financeiro { background: #8c7851; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 10px; font-weight: bold; }
        
        .dados-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .dados-grid input, .dados-grid select { padding: 10px; border: 1px solid #ddd; border-radius: 4px; width: 100%; box-sizing: border-box; }
        
        .resumo-financeiro { display: flex; justify-content: space-between; background: #fcfbf9; padding: 10px; border-radius: 8px; margin-top: 15px; font-size: 0.8rem; border: 1px dashed #ddd; }

        @media print {
            .btn-save, .btn-print, .btn-financeiro, .header-ficha a, .col-financeiro { display: none !important; }
            .card { box-shadow: none; border: 1px solid #eee; }
            body { background: white; }
        }
    </style>
</head>
<body style="background-color: #fcfbf9;">

    <div class="detalhes-container">
        <div class="header-ficha">
            <div>
                <a href="adm.html" style="text-decoration: none; color: #888; font-size: 0.9rem;">← Voltar ao Painel</a>
                <h1 id="nomeDisplay" style="margin-top: 10px;">Carregando...</h1>
                <p id="infoCliente" style="color: #666;"></p>
            </div>
            <div>
                <button class="btn-print" onclick="window.print()">🖨️ Imprimir Notas</button>
                <button class="btn-save" onclick="salvarTudo()">Salvar Prontuário Completo</button>
            </div>
        </div>

        <div class="grid-prontuario">
            <div class="col-dados">
                <div class="card">
                    <h3>Dados do Paciente</h3>
                    <div class="dados-grid">
                        <div><label>E-mail</label><input type="text" id="email"></div>
                        <div><label>Telefone</label><input type="text" id="telefone"></div>
                        <div>
                            <label>Nascimento</label>
                            <input type="date" id="nascimento" onchange="calcularIdadeAutomático(this.value)">
                        </div>
                        <div><label>Idade</label><input type="text" id="idade" readonly style="background: #f9f9f9;"></div>
                        <div>
                            <label>Status</label>
                            <select id="statusPaciente">
                                <option value="Atendimento">Em Atendimento</option>
                                <option value="Pausa">Em Pausa</option>
                                <option value="Alta">Alta Terapêutica</option>
                            </select>
                        </div>
                        <div><label>Morada/Endereço</label><input type="text" id="morada"></div>
                    </div>
                </div>
                <div class="card">
                    <h3>Notas de Evolução (Sigiloso)</h3>
                    <textarea id="notasEvolucao" placeholder="Descreva aqui o desenvolvimento do caso..."></textarea>
                </div>
            </div>

            <div class="col-financeiro">
                <div class="card">
                    <h3>Financeiro</h3>
                    <button class="btn-financeiro" onclick="addSessao()">+ Lançar Sessão</button>
                    <table id="tabelaFinanceiro">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Valor</th>
                                <th>Status</th>
                                <th style="text-align:center;">Recibo</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                    <div class="resumo-financeiro" id="resumoFinanceiro">
                        <span>Pendente: 0€</span>
                        <span>Total Pago: 0€</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const idCliente = urlParams.get('id');
        let dadosPaciente = null;

        async function carregarDados() {
            const { data, error } = await _supabase.from('pacientes').select('*').eq('id', idCliente).single();

            if (error || !data) {
                alert("Erro ao localizar paciente.");
                window.location.href = "adm.html";
                return;
            }

            dadosPaciente = data;
            if (!dadosPaciente.financeiro) dadosPaciente.financeiro = [];

            // Preencher Interface
            document.getElementById('nomeDisplay').innerText = data.nome || "Sem Nome";
            document.getElementById('infoCliente').innerText = `ID/Senha: #${data.codigo_acesso || data.senha_acesso}`;
            
            // Preencher Inputs
            document.getElementById('email').value = data.email || "";
            document.getElementById('telefone').value = data.telefone || "";
            document.getElementById('nascimento').value = data.nascimento || "";
            document.getElementById('idade').value = data.idade || "";
            document.getElementById('morada').value = data.morada || "";
            document.getElementById('statusPaciente').value = data.status || "Atendimento";
            document.getElementById('notasEvolucao').value = data.notas || data.notas_evolucao || "";

            renderFinanceiro();
        }

        function calcularIdadeAutomático(dataNasc) {
            if (!dataNasc) return;
            const hoje = new Date();
            const nasc = new Date(dataNasc);
            let idade = hoje.getFullYear() - nasc.getFullYear();
            const m = hoje.getMonth() - nasc.getMonth();
            if (m < 0 || (m === 0 && hoje.getDate() < nasc.getDate())) idade--;
            document.getElementById('idade').value = idade;
        }

        function renderFinanceiro() {
            const tbody = document.querySelector('#tabelaFinanceiro tbody');
            tbody.innerHTML = '';
            let pago = 0;
            let pendente = 0;
            
            dadosPaciente.financeiro.forEach((item, index) => {
                const classeStatus = item.status === "Pago" ? "status-pago" : "status-pendente";
                const valorNum = parseFloat(item.valor) || 0;
                
                if(item.status === "Pago") pago += valorNum;
                else pendente += valorNum;

                tbody.innerHTML += `
                    <tr>
                        <td>${item.data}</td>
                        <td>${valorNum}€</td>
                        <td class="${classeStatus}" onclick="alternarStatus(${index})" style="cursor:pointer">${item.status}</td>
                        <td style="text-align:center;">
                            <button onclick="gerarRecibo(${index})" style="border:none; background:none; cursor:pointer;">📄</button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('resumoFinanceiro').innerHTML = `
                <strong style="color:#d4a373">Pendente: ${pendente.toFixed(2)}€</strong>
                <strong style="color:#7b8f80">Pago: ${pago.toFixed(2)}€</strong>
            `;
        }

        function addSessao() {
            const valor = prompt("Valor da Sessão (€):", "50.00");
            if (valor) {
                dadosPaciente.financeiro.push({
                    data: new Date().toLocaleDateString('pt-PT'),
                    valor: valor,
                    status: "Pendente",
                    descricao: "Atendimento Psicanalítico"
                });
                renderFinanceiro();
            }
        }

        function alternarStatus(index) {
            dadosPaciente.financeiro[index].status = dadosPaciente.financeiro[index].status === "Pendente" ? "Pago" : "Pendente";
            renderFinanceiro();
        }

        function gerarRecibo(index) {
            const lanc = dadosPaciente.financeiro[index];
            const win = window.open('', '', 'height=600,width=600');
            win.document.write(`<html><body style="font-family:sans-serif; padding:50px;"><div style="border:2px solid #7b8f80; padding:30px; border-radius:10px;"><h2 style="color:#7b8f80; text-align:center;">RECIBO</h2><p><strong>Emitente:</strong> Michelly Eufrazio Santos</p><p><strong>Paciente:</strong> ${dadosPaciente.nome}</p><hr><p>Recebi a importância de <strong>${lanc.valor}€</strong></p><p>Referente a: ${lanc.descricao}</p><p>Data: ${lanc.data}</p><br><br><p style="text-align:center;">__________________________________<br>Assinatura</p></div></body></html>`);
            win.document.close();
            win.print();
        }

        async function salvarTudo() {
            const btn = document.querySelector('.btn-save');
            btn.innerText = "Sincronizando...";
            btn.disabled = true;

            const updateData = {
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value,
                nascimento: document.getElementById('nascimento').value,
                idade: document.getElementById('idade').value,
                morada: document.getElementById('morada').value,
                status: document.getElementById('statusPaciente').value,
                notas: document.getElementById('notasEvolucao').value,
                financeiro: dadosPaciente.financeiro
            };

            const { error } = await _supabase.from('pacientes').update(updateData).eq('id', idCliente);

            if (error) alert("Erro ao salvar: " + error.message);
            else alert("✅ Prontuário atualizado!");
            
            btn.innerText = "Salvar Prontuário Completo";
            btn.disabled = false;
            carregarDados();
        }

        document.addEventListener('DOMContentLoaded', carregarDados);
    </script>
</body>
</html>
