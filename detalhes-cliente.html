<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prontuário | Michelly Santos</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .detalhes-container { max-width: 1000px; margin: 40px auto; padding: 20px; font-family: sans-serif; }
        .grid-prontuario { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .header-ficha { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* Estilos Financeiro */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
        .status-pago { color: #7b8f80; font-weight: bold; cursor: pointer; }
        .status-pendente { color: #d4a373; font-weight: bold; cursor: pointer; }
        
        textarea { width: 100%; height: 250px; border: 1px solid #eee; border-radius: 8px; padding: 15px; font-family: inherit; resize: none; margin-top: 10px; box-sizing: border-box; }
        .btn-save { background: #7b8f80; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-financeiro { background: #8c7851; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 10px; font-weight: bold; }
        
        .dados-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .dados-grid input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body style="background-color: #fcfbf9;">

    <div class="detalhes-container">
        <div class="header-ficha">
            <div>
                <a href="adm.html" style="text-decoration: none; color: #888;">← Voltar ao Painel</a>
                <h1 id="nomeDisplay">Carregando...</h1>
                <p id="infoCliente" style="color: #666;"></p>
            </div>
            <button class="btn-save" onclick="salvarTudo()">Salvar Prontuário Completo</button>
        </div>

        <div class="grid-prontuario">
            <div class="col-dados">
                <div class="card">
                    <h3>Dados do Paciente</h3>
                    <div class="dados-grid">
                        <div><label>E-mail</label><input type="text" id="email"></div>
                        <div><label>Telefone</label><input type="text" id="telefone"></div>
                    </div>
                </div>
                <div class="card">
                    <h3>Notas de Evolução (Sigiloso)</h3>
                    <textarea id="notasEvolucao" placeholder="Registre aqui os detalhes da sessão..."></textarea>
                </div>
            </div>

            <div class="col-financeiro">
                <div class="card">
                    <h3>Financeiro / Pagamentos</h3>
                    <button class="btn-financeiro" onclick="addSessao()">+ Lançar Novo Débito</button>
                    <table id="tabelaFinanceiro">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Valor</th>
                                <th>Status</th>
                                <th>Recibo</th>
                            </tr>
                        </thead>
                        <tbody>
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const idCliente = urlParams.get('id');
        let dadosPaciente = null;

        // 1. CARREGAR DADOS
        async function carregarDados() {
            const { data, error } = await _supabase
                .from('pacientes')
                .select('*')
                .eq('id', idCliente)
                .single();

            if (error || !data) {
                alert("Erro ao localizar paciente.");
                window.location.href = "adm.html";
                return;
            }

            dadosPaciente = data;
            if (!dadosPaciente.financeiro) dadosPaciente.financeiro = [];

            // Preencher campos
            document.getElementById('nomeDisplay').innerText = data.nome;
            document.getElementById('infoCliente').innerText = `ID/Senha: #${data.codigo_acesso || data.senha_acesso}`;
            document.getElementById('email').value = data.email || "";
            document.getElementById('telefone').value = data.telefone || "";
            document.getElementById('notasEvolucao').value = data.notas || "";

            renderFinanceiro();
        }

        // 2. RENDER FINANCEIRO
        function renderFinanceiro() {
            const tbody = document.querySelector('#tabelaFinanceiro tbody');
            tbody.innerHTML = '';
            
            dadosPaciente.financeiro.forEach((item, index) => {
                const classeStatus = item.status === "Pago" ? "status-pago" : "status-pendente";
                tbody.innerHTML += `
                    <tr>
                        <td>${item.data}</td>
                        <td>${item.valor}€</td>
                        <td class="${classeStatus}" onclick="alternarStatus(${index})">${item.status}</td>
                        <td style="text-align:center;">
                            <button onclick="gerarRecibo(${index})" style="border:none; background:none; cursor:pointer;">📄</button>
                        </td>
                    </tr>
                `;
            });
        }

        // 3. FUNÇÕES FINANCEIRAS
        function addSessao() {
            const valor = prompt("Valor da Sessão (€):", "50.00");
            if (valor) {
                const novo = {
                    data: new Date().toLocaleDateString('pt-PT'),
                    valor: valor,
                    status: "Pendente",
                    descricao: "Atendimento Psicanalítico"
                };
                dadosPaciente.financeiro.push(novo);
                renderFinanceiro();
            }
        }

        function alternarStatus(index) {
            dadosPaciente.financeiro[index].status = dadosPaciente.financeiro[index].status === "Pendente" ? "Pago" : "Pendente";
            renderFinanceiro();
        }

        // 4. EMISSÃO DE RECIBO
        function gerarRecibo(index) {
            const lanc = dadosPaciente.financeiro[index];
            const win = window.open('', '', 'height=600,width=600');
            win.document.write(`
                <html>
                <body style="font-family:sans-serif; padding:50px;">
                    <div style="border:2px solid #7b8f80; padding:30px; border-radius:10px;">
                        <h2 style="color:#7b8f80; text-align:center;">RECIBO</h2>
                        <p><strong>Emitente:</strong> Michelly Eufrazio Santos</p>
                        <p><strong>Paciente:</strong> ${dadosPaciente.nome}</p>
                        <hr>
                        <p>Recebi a importância de <strong>${lanc.valor}€</strong></p>
                        <p>Referente a: ${lanc.descricao}</p>
                        <p>Data do Serviço: ${lanc.data}</p>
                        <br><br>
                        <p style="text-align:center;">__________________________________<br>Assinatura</p>
                    </div>
                </body>
                </html>
            `);
            win.document.close();
            win.print();
        }

        // 5. SALVAR TUDO NO SUPABASE
async function salvarTudo() {
    const btn = document.querySelector('.btn-save');
    btn.innerText = "Salvando...";

    // Captura os valores EXATOS das caixas de texto
    const updateData = {
        email: document.getElementById('email').value,
        telefone: document.getElementById('telefone').value,
        nascimento: document.getElementById('nascimento') ? document.getElementById('nascimento').value : null,
        idade: document.getElementById('idade') ? document.getElementById('idade').value : null,
        morada: document.getElementById('morada') ? document.getElementById('morada').value : null,
        notas: document.getElementById('notasEvolucao').value,
        financeiro: dadosPaciente.financeiro // Envia a lista de pagamentos
    };

    try {
        const { error } = await _supabase
            .from('pacientes')
            .update(updateData)
            .eq('id', idCliente);

        if (error) throw error;
        alert("✅ Tudo salvo com sucesso no Supabase!");
    } catch (err) {
        alert("Erro ao salvar: " + err.message);
    } finally {
        btn.innerText = "Salvar Prontuário Completo";
    }
}
        document.addEventListener('DOMContentLoaded', carregarDados);
    </script>
</body>
</html>
