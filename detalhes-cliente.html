<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prontuário | Michelly Santos</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .detalhes-container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        .grid-prontuario { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .status-pago { color: #7b8f80; font-weight: bold; }
        .status-pendente { color: #d4a373; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        textarea { width: 100%; height: 200px; border: 1px solid #eee; border-radius: 8px; padding: 15px; font-family: inherit; resize: none; margin-top: 10px; }
        .header-ficha { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    </style>
</head>
<body style="background-color: #fcfbf9;">

    <div class="detalhes-container">
        <div class="header-ficha">
            <div>
                <a href="adm.html" style="text-decoration: none; color: #888;">← Voltar ao Painel</a>
                <h1 id="nomeCliente" style="margin-top: 10px;">Carregando...</h1>
                <p id="infoCliente" style="color: #666;"></p>
            </div>
            <button class="btn" onclick="salvarTudo()">Salvar Prontuário</button>
        </div>

        <div class="grid-prontuario">
            <div class="col-evolucao">
                <div class="card">
                    <h3>Notas de Evolução (Sigiloso)</h3>
                    <textarea id="notasEvolucao" placeholder="Descreva aqui os pontos principais da sessão..."></textarea>
                </div>
            </div>

            <div class="col-financeiro">
                <div class="card">
                    <h3>Financeiro</h3>
                    <button class="btn" style="width: 100%; font-size: 0.8rem; margin-bottom: 15px;" onclick="addSessao()">+ Lançar Débito</button>
                    <table id="tabelaFinanceiro">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Valor</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Identificar o cliente pelo ID na URL
        const urlParams = new URLSearchParams(window.location.search);
        const idCliente = urlParams.get('id');
        let clientes = JSON.parse(localStorage.getItem('clientes_michelly')) || [];
        let cliente = clientes.find(c => c.id === idCliente);

        if (!cliente) {
            alert("Cliente não encontrado!");
            window.location.href = "adm.html";
        }

        // 2. Preencher os dados na tela
        document.getElementById('nomeCliente').innerText = cliente.nome;
        document.getElementById('infoCliente').innerText = `ID: #${cliente.id} | Pasta: ${cliente.pasta}`;
        document.getElementById('notasEvolucao').value = cliente.notas || "";

        function renderFinanceiro() {
            const tbody = document.querySelector('#tabelaFinanceiro tbody');
            tbody.innerHTML = '';
            
            if (cliente.financeiro) {
                cliente.financeiro.forEach((item, index) => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${item.data}</td>
                            <td>R$ ${item.valor}</td>
                            <td class="status-${item.status.toLowerCase()}" onclick="alternarStatus(${index})" style="cursor:pointer">
                                ${item.status}
                            </td>
                        </tr>
                    `;
                });
            }
        }

        // 3. Funções de Alimentação
        function addSessao() {
            const valor = prompt("Valor da sessão (R$):", "150.00");
            if (valor) {
                if (!cliente.financeiro) cliente.financeiro = [];
                const hoje = new Date().toLocaleDateString('pt-BR');
                cliente.financeiro.push({ data: hoje, valor: valor, status: "Pendente" });
                renderFinanceiro();
            }
        }

        function alternarStatus(index) {
            cliente.financeiro[index].status = cliente.financeiro[index].status === "Pendente" ? "Pago" : "Pendente";
            renderFinanceiro();
        }

        function salvarTudo() {
            cliente.notas = document.getElementById('notasEvolucao').value;
            localStorage.setItem('clientes_michelly', JSON.stringify(clientes));
            alert("Dados salvos com sucesso na pasta de " + cliente.nome);
        }

        renderFinanceiro();
    </script>
</body>
</html>
