<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prontuário Master | Michelly Santos</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #fcfbf9; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        .detalhes-container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        .grid-prontuario { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card h3 { color: #8c7851; border-bottom: 1px solid #f4f1ea; padding-bottom: 10px; margin-top: 0; }
        
        .header-ficha { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
        
        /* Estilização da Anamnese */
        .anamnese-box { 
            background: #fdfaf5; 
            border-left: 4px solid #d4a373; 
            padding: 20px; 
            border-radius: 8px; 
            margin-top: 10px; 
            font-size: 0.95rem; 
            line-height: 1.8; 
            color: #444; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
        }
        .no-data { color: #999; font-style: italic; font-size: 0.85rem; }

        .dados-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .dados-grid label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        .dados-grid input, .dados-grid select { padding: 10px; border: 1px solid #e9e0d2; border-radius: 6px; width: 100%; box-sizing: border-box; }
        
        textarea { width: 100%; height: 350px; border: 1px solid #e9e0d2; border-radius: 8px; padding: 15px; font-family: inherit; resize: none; margin-top: 10px; box-sizing: border-box; line-height: 1.6; outline: none; }
        textarea:focus { border-color: #d4a373; }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #f4f1ea; }
        .status-pago { color: #7b8f80; font-weight: bold; }
        .status-pendente { color: #d4a373; font-weight: bold; }

        .btn-save { background: #7b8f80; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-save:hover { background: #637367; transform: translateY(-2px); }
        .btn-print { background: white; color: #555; border: 1px solid #ddd; padding: 12px 20px; border-radius: 8px; cursor: pointer; margin-right: 10px; }
        .btn-financeiro { background: #8c7851; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 15px; }

        @media print {
            .btn-save, .btn-print, .btn-financeiro, .header-ficha a, .col-financeiro { display: none !important; }
            .detalhes-container { margin: 0; padding: 0; }
            .card { box-shadow: none; border: 1px solid #eee; }
        }
    </style>
</head>
<body>

    <div class="detalhes-container">
        <div class="header-ficha">
            <div>
                <a href="adm.html" style="text-decoration: none; color: #888; font-size: 0.9rem;">← Voltar ao Painel</a>
                <h1 id="nomeDisplay" style="margin: 10px 0 5px 0; color: #555;">Carregando...</h1>
                <p id="infoCliente" style="color: #d4a373; font-weight: bold; margin: 0;"></p>
            </div>
            <div>
                <button class="btn-print" onclick="window.print()">🖨️ Imprimir</button>
                <button class="btn-save" onclick="salvarTudo()">Salvar Prontuário</button>
            </div>
        </div>

        <div class="grid-prontuario">
            <div class="col-dados">
                <!-- CARD DADOS CADASTRAIS -->
                <div class="card">
                    <h3>Dados Pessoais</h3>
                    <div class="dados-grid">
                        <div><label>E-mail (Login)</label><input type="text" id="email" readonly style="background:#f9f9f9"></div>
                        <div><label>Telefone</label><input type="text" id="telefone"></div>
                        <div><label>Nascimento</label><input type="date" id="nascimento" onchange="calcularIdadeAutomático(this.value)"></div>
                        <div><label>Idade</label><input type="text" id="idade" readonly style="background: #f9f9f9;"></div>
                        <div>
                            <label>Status Terapêutico</label>
                            <select id="statusPaciente">
                                <option value="Atendimento">Em Atendimento</option>
                                <option value="Pausa">Em Pausa</option>
                                <option value="Alta">Alta Terapêutica</option>
                            </select>
                        </div>
                        <div><label>Morada/Endereço</label><input type="text" id="morada"></div>
                    </div>
                </div>

                <!-- RELATÓRIO DE ANAMNESE -->
                <div class="card">
                    <h3>Relatório de Anamnese Inicial</h3>
                    <div id="anamneseConteudo" class="no-data">Carregando dados da anamnese...</div>
                </div>

                <!-- CARD NOTAS -->
                <div class="card">
                    <h3>Notas de Evolução (Sigiloso)</h3>
                    <textarea id="notasEvolucao" placeholder="Registre aqui a evolução das sessões..."></textarea>
                </div>
            </div>

            <div class="col-financeiro">
                <div class="card">
                    <h3>Histórico Financeiro</h3>
                    <button class="btn-financeiro" onclick="addSessao()">+ Registrar Nova Sessão</button>
                    
                    <table id="tabelaFinanceiro">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Valor</th>
                                <th>Status</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                    
                    <div id="resumoFinanceiro" style="margin-top: 20px; padding-top: 15px; border-top: 1px dashed #eee; display: flex; justify-content: space-between; font-size: 0.9rem;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const idCliente = urlParams.get('id');
        let dadosPaciente = null;

        async function carregarDados() {
            const { data, error } = await _supabase.from('pacientes').select('*').eq('id', idCliente).single();

            if (error || !data) {
                alert("Erro ao localizar paciente.");
                window.location.href = "adm.html";
                return;
            }

            dadosPaciente = data;
            if (!dadosPaciente.financeiro) dadosPaciente.financeiro = [];

            // 1. Cabeçalho e Senha
            document.getElementById('nomeDisplay').innerText = data.nome;
            document.getElementById('infoCliente').innerText = `SENHA DE ACESSO: #${data.codigo_acesso || data.senha_acesso || '---'}`;
            
            // 2. Preencher Formulário
            document.getElementById('email').value = data.email || "";
            document.getElementById('telefone').value = data.telefone || "";
            document.getElementById('nascimento').value = data.nascimento || "";
            document.getElementById('morada').value = data.morada || "";
            document.getElementById('statusPaciente').value = data.status || "Atendimento";
            document.getElementById('notasEvolucao').value = data.notas || "";

            // 3. Cálculo de idade automático
            if (data.nascimento) {
                calcularIdadeAutomático(data.nascimento);
            }

            // 4. Lógica de Anamnese (JSON ou Texto)
            const box = document.getElementById('anamneseConteudo');
            if (data.anamnese_completa) {
                box.className = "anamnese-box";
                const anam = data.anamnese_completa;
                const nomesAmigaveis = {
                    sexo: "Sexo",
                    estado_civil: "Estado Civil",
                    medicamentos: "Usa Medicamentos?",
                    queixa: "Queixa Principal",
                    trauma: "Histórico de Trauma",
                    credo: "Frequenta Credo/Fé",
                    profissao: "Profissão"
                };

                let relatorioHTML = `<div style="margin-bottom:10px; border-bottom:1px solid #e9e0d2; padding-bottom:5px; font-weight:bold; color:#8c7851;">DADOS COLETADOS NO FORMULÁRIO:</div>`;
                for (const [chave, valor] of Object.entries(anam)) {
                    const titulo = nomesAmigaveis[chave] || chave.toUpperCase();
                    relatorioHTML += `<p style="margin: 5px 0;"><strong>${titulo}:</strong> ${valor}</p>`;
                }
                box.innerHTML = relatorioHTML;
            } else if (data.anamnese) {
                box.className = "anamnese-box";
                box.innerText = data.anamnese;
            } else {
                box.innerHTML = "Nenhuma resposta de anamnese vinculada a este e-mail ainda.";
                box.className = "no-data";
            }

            renderFinanceiro();
        }

        function calcularIdadeAutomático(dataNasc) {
            if (!dataNasc) return;
            const hoje = new Date();
            const nasc = new Date(dataNasc);
            let idade = hoje.getFullYear() - nasc.getFullYear();
            if (hoje.getMonth() < nasc.getMonth() || (hoje.getMonth() === nasc.getMonth() && hoje.getDate() < nasc.getDate())) idade--;
            document.getElementById('idade').value = idade;
        }

        function renderFinanceiro() {
            const tbody = document.querySelector('#tabelaFinanceiro tbody');
            tbody.innerHTML = '';
            let pago = 0, pendente = 0;
            
            dadosPaciente.financeiro.forEach((item, index) => {
                const valorNum = parseFloat(item.valor) || 0;
                item.status === "Pago" ? pago += valorNum : pendente += valorNum;

                tbody.innerHTML += `
                    <tr>
                        <td>${item.data}</td>
                        <td style="font-weight:bold">R$ ${valorNum.toFixed(2)}</td>
                        <td class="${item.status === 'Pago' ? 'status-pago' : 'status-pendente'}" 
                            onclick="alternarStatus(${index})" style="cursor:pointer">
                            ${item.status}
                        </td>
                        <td><button onclick="gerarRecibo(${index})" style="border:none; background:none; cursor:pointer;">📄</button></td>
                    </tr>`;
            });

            document.getElementById('resumoFinanceiro').innerHTML = `
                <span class="status-pendente">A receber: R$ ${pendente.toFixed(2)}</span>
                <span class="status-pago">Total pago: R$ ${pago.toFixed(2)}</span>
            `;
        }

        function addSessao() {
            const valor = prompt("Valor da Sessão (R$):", "150.00");
            if (valor) {
                dadosPaciente.financeiro.push({
                    data: new Date().toLocaleDateString('pt-BR'),
                    valor: valor,
                    status: "Pendente"
                });
                renderFinanceiro();
            }
        }

        function alternarStatus(index) {
            dadosPaciente.financeiro[index].status = dadosPaciente.financeiro[index].status === "Pendente" ? "Pago" : "Pendente";
            renderFinanceiro();
        }

        async function salvarTudo() {
            const btn = document.querySelector('.btn-save');
            btn.innerText = "Salvando...";
            
            const updateData = {
                telefone: document.getElementById('telefone').value,
                nascimento: document.getElementById('nascimento').value,
                idade: document.getElementById('idade').value,
                morada: document.getElementById('morada').value,
                status: document.getElementById('statusPaciente').value,
                notas: document.getElementById('notasEvolucao').value,
                financeiro: dadosPaciente.financeiro
            };

            const { error } = await _supabase.from('pacientes').update(updateData).eq('id', idCliente);

            if (error) alert("Erro ao salvar: " + error.message);
            else alert("Prontuário atualizado com sucesso!");
            
            btn.innerText = "Salvar Prontuário";
        }

        function gerarRecibo(index) {
            const lanc = dadosPaciente.financeiro[index];
            const win = window.open('', '', 'height=600,width=600');
            win.document.write(`<html><body style="font-family:sans-serif; padding:40px;"><div style="border:5px solid #7b8f80; padding:20px;"><h2>RECIBO DE ATENDIMENTO</h2><p>Recebi de <b>${dadosPaciente.nome}</b> a quantia de <b>R$ ${lanc.valor}</b> referente a sessão psicoterapêutica em ${lanc.data}.</p><br><br><p>Michelly Eufrazio Santos - Psicanalista</p></div></body></html>`);
            win.print();
        }

        document.addEventListener('DOMContentLoaded', carregarDados);
    </script>
</body>
</html>
